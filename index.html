<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My ToDo App</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#007bff" />

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    .app-header {
      background: #007bff;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      border-radius: 0 0 12px 12px;
      margin: -20px -20px 20px -20px;
    }

    input, button {
      font-size: 18px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      margin-top: 10px;
    }

    .todo-item {
      background: #ffffff;
      padding: 15px;
      margin-top: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeIn 0.3s ease;
    }

    input[type="checkbox"] {
      width: 24px;
      height: 24px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <header class="app-header">My ToDo</header>

  <div class="container">
    <input id="todoInput" type="text" placeholder="やることを入力…" />
    <button onclick="addTodo()">追加</button>

    <div id="todoList"></div>
  </div>

  <script>
    // -------------------------
    // 保存されたToDoを読み込む
    // -------------------------
    window.onload = function() {
      const saved = JSON.parse(localStorage.getItem("todos") || "[]");
      saved.forEach(todo => {
        createTodoItem(todo.text, todo.done);
      });
    };

    // -------------------------
    // ToDo追加
    // -------------------------
    function addTodo() {
      const input = document.getElementById("todoInput");
      const text = input.value.trim();
      if (text === "") return;

      createTodoItem(text, false);
      saveTodos();

      input.value = "";
    }

    // -------------------------
    // ToDoのHTMLを作る
    // -------------------------
    function createTodoItem(text, done) {
      const list = document.getElementById("todoList");

      const item = document.createElement("div");
      item.className = "todo-item";

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = done;
      checkbox.onchange = saveTodos;

      const label = document.createElement("span");
      label.textContent = text;

      item.appendChild(checkbox);
      item.appendChild(label);
      list.appendChild(item);
    }

    // -------------------------
    // ToDoを保存する
    // -------------------------
    function saveTodos() {
      const items = document.querySelectorAll(".todo-item");
      const data = [];

      items.forEach(item => {
        const checkbox = item.querySelector("input[type='checkbox']");
        const label = item.querySelector("span");

        data.push({
          text: label.textContent,
          done: checkbox.checked
        });
      });

      localStorage.setItem("todos", JSON.stringify(data));
    }

    // -------------------------
    // PWA service worker
    // -------------------------
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
